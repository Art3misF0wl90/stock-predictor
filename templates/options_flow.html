<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Options Flow — Stock Predictor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:      #0f1117;
      --panel:   #1a1d2e;
      --border:  #2d3748;
      --text:    #e2e8f0;
      --subtext: #718096;
      --green:   #1D9E75;
      --red:     #E24B4A;
      --blue:    #378ADD;
      --orange:  #EF9F27;
      --purple:  #9F7AEA;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .brand {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.08em;
      text-decoration: none;
    }
    nav a {
      color: var(--subtext);
      text-decoration: none;
      font-size: 13px;
      transition: color .15s;
    }
    nav a:hover, nav a.active { color: var(--text); }
    nav .spacer { flex: 1; }
    #nav-clock {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--subtext);
    }

    /* ── Scan bar ── */
    .scan-bar {
      padding: 12px 28px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:hover   { opacity: .85; }
    .btn:active  { transform: scale(.97); }
    .btn:disabled { background: var(--border); color: var(--subtext); cursor: not-allowed; opacity: 1; }
    .btn-primary { background: var(--blue);  color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text); }

    .status-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--subtext);
    }

    .chart-link {
      margin-left: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--subtext);
      padding: 6px 12px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 11px;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .chart-link:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Content ── */
    .content { padding: 24px 28px; flex: 1; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ── Ticker card ── */
    .ticker-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      transition: border-color .15s;
    }
    .ticker-card:hover { border-color: #4a5568; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .card-ticker { font-family: var(--mono); font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
    .card-price  { font-family: var(--mono); font-size: 20px; font-weight: 700; text-align: right; }
    .card-expiry { font-family: var(--mono); font-size: 10px; color: var(--subtext); margin-top: 3px; letter-spacing: 0.04em; }

    /* Flow badge */
    .flow-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-top: 5px;
    }
    .flow-Bullish { background: rgba(29,158,117,0.15);  color: var(--green);  border: 1px solid rgba(29,158,117,0.3); }
    .flow-Bearish { background: rgba(226,75,74,0.15);   color: var(--red);    border: 1px solid rgba(226,75,74,0.3); }
    .flow-Neutral { background: rgba(113,128,150,0.12); color: var(--subtext); border: 1px solid rgba(113,128,150,0.25); }

    /* Prediction box */
    .pred-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .pred-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .agree-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
    }
    .agree-true  { background: rgba(29,158,117,0.15); color: var(--green); border: 1px solid rgba(29,158,117,0.3); }
    .agree-false { background: rgba(226,75,74,0.15);  color: var(--red);   border: 1px solid rgba(226,75,74,0.3); }
    .pred-detail { margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--subtext); }

    /* Metrics row */
    .metrics-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .metric-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .metric-label { font-family: var(--mono); font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .metric-value { font-family: var(--mono); font-size: 14px; font-weight: 600; }
    .metric-sub   { font-family: var(--mono); font-size: 10px; color: var(--subtext); margin-top: 3px; }

    /* Expected move bar */
    .em-bar {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 12px;
      margin-bottom: 10px;
      gap: 8px;
    }
    .em-label { color: var(--subtext); white-space: nowrap; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
    .em-value { font-weight: 600; }
    .em-range  { color: var(--subtext); font-size: 11px; white-space: nowrap; }

    /* Unusual volume */
    .unusual-section { margin-top: 4px; }
    .unusual-title {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .unusual-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(45,55,72,0.4);
    }
    .unusual-row:last-child { border-bottom: none; }
    .u-call { color: var(--green); font-weight: 600; }
    .u-put  { color: var(--red);   font-weight: 600; }
    .u-ratio { color: var(--orange); }
    .u-vol   { color: var(--subtext); font-size: 11px; }

    /* Error card */
    .error-card {
      background: rgba(226,75,74,0.08);
      border: 1px solid rgba(226,75,74,0.25);
      border-radius: 10px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
    }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--subtext);
      font-family: var(--mono);
    }
    .loading-state .headline { font-size: 14px; margin-bottom: 8px; color: var(--text); }
    .loading-state .sub      { font-size: 12px; color: var(--subtext); }

    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <a class="brand" href="/">◈ STOCK PRED</a>
  <a href="/">Dashboard</a>
  <a href="/portfolio">Portfolio</a>
  <a href="/options-flow" class="active">Options Flow</a>
  <div class="spacer"></div>
  <div id="nav-clock"></div>
</nav>

<!-- Scan bar -->
<div class="scan-bar">
  <button class="btn btn-primary" id="scan-btn" onclick="startScan()">⟳ Scan All Tickers</button>
  <span class="status-text" id="status-text">Click Scan to analyze options chains for all watchlist tickers</span>
  <a href="/api/options-flow/chart" target="_blank" class="chart-link" id="chart-link" style="display:none">
    View Plotly Chart ↗
  </a>
</div>

<div class="content">
  <div id="main-container">
    <div class="loading-state">
      <div class="headline">No scan data</div>
      <div class="sub">Click "Scan All Tickers" to fetch options flow — takes ~30–60 seconds</div>
    </div>
  </div>
</div>

<script>
  let pollTimer = null;

  // ── Clock ─────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('nav-clock').textContent =
      now.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) + '  ' +
      now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Scan ──────────────────────────────────────────────────────────────────
  async function startScan() {
    const btn = document.getElementById("scan-btn");
    btn.disabled = true; btn.textContent = "Scanning…";
    setStatus("Scanning options chains for all tickers…");
    showLoading("Scanning options chains…", "This takes 30–60 seconds");

    try {
      await fetch("/api/options-flow/scan", {method:"POST"});
      pollTimer = setInterval(checkStatus, 3000);
    } catch(e) {
      setStatus("Error starting scan. Try again.");
      resetBtn();
    }
  }

  async function checkStatus() {
    try {
      const r    = await fetch("/api/options-flow");
      const data = await r.json();

      if (!data.scanning && data.has_data) {
        clearInterval(pollTimer); pollTimer = null;
        resetBtn("⟳ Rescan");
        const n = Object.keys(data.results).length;
        setStatus(`${n} ticker${n !== 1 ? "s" : ""} scanned`);
        if (data.timestamp) {
          document.getElementById("nav-clock").textContent = `Last scan: ${data.timestamp}`;
        }
        document.getElementById("chart-link").style.display = "inline-block";
        renderCards(data.results);
      } else if (!data.scanning && !data.has_data) {
        clearInterval(pollTimer); pollTimer = null;
        resetBtn();
        setStatus("Scan failed — check server logs and try again.");
      }
    } catch(e) { console.error("Status check error:", e); }
  }

  function setStatus(msg) {
    document.getElementById("status-text").textContent = msg;
  }

  function resetBtn(label = "⟳ Scan All Tickers") {
    const btn = document.getElementById("scan-btn");
    btn.disabled = false; btn.textContent = label;
  }

  function showLoading(headline, sub) {
    document.getElementById("main-container").innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="headline">${headline}</div>
        <div class="sub">${sub}</div>
      </div>`;
  }

  // ── Rendering ─────────────────────────────────────────────────────────────
  function renderCards(results) {
    const grid = document.createElement("div");
    grid.className = "cards-grid";

    for (const [ticker, data] of Object.entries(results)) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = buildCard(ticker, data);
      grid.appendChild(wrapper.firstElementChild);
    }

    const container = document.getElementById("main-container");
    container.innerHTML = "";
    container.appendChild(grid);
  }

  function buildCard(ticker, data) {
    if (data.error) {
      return `<div class="error-card"><strong>${ticker}</strong> — ${data.error}</div>`;
    }

    const spot    = data.spot            || 0;
    const pcr     = data.pcr             || {};
    const ivr     = data.iv_rank         || {};
    const gex     = data.gex             || {};
    const em      = data.expected_move   || {};
    const ms      = data.model_signal    || {};
    const pred    = data.prediction      || {};
    const unusual = data.unusual_volume  || [];
    const flow    = data.flow_bias       || "Neutral";

    // Colors
    const pcrVal   = pcr.pcr_volume || 0;
    const pcrColor = pcrVal < 0.7 ? "var(--green)" : pcrVal > 1.2 ? "var(--red)" : "var(--orange)";
    const ivrVal   = ivr.iv_rank != null ? ivr.iv_rank : 50;
    const ivrColor = ivrVal < 30 ? "var(--green)" : ivrVal > 70 ? "var(--red)" : "var(--orange)";
    const gexColor = gex.gex_bias === "Pinning" ? "var(--blue)" : "var(--orange)";

    const hasModel = !ms.error && ms.direction;
    const hasPred  = pred.status !== "insufficient_data" && hasModel;

    const modelColor = ms.direction === "UP" ? "var(--green)" : "var(--red)";
    const flowColor  = flow === "Bullish" ? "var(--green)" : flow === "Bearish" ? "var(--red)" : "var(--subtext)";
    const flowArrow  = flow === "Bullish" ? "▲" : flow === "Bearish" ? "▼" : "─";

    // Prediction block
    let predHtml = "";
    if (hasPred) {
      const agree      = pred.agreement;
      const conviction = (pred.conviction || "").slice(0, 28);
      const tgt        = pred.price_target ? `→ $${pred.price_target}` : "";
      predHtml = `
        <div class="pred-box">
          <div class="pred-row">
            <div>
              <span class="agree-badge agree-${agree}">${agree ? "✓ AGREE" : "✗ SPLIT"}</span>
              <span style="font-family:var(--mono);font-size:10px;color:var(--subtext);margin-left:6px">${conviction}</span>
            </div>
            ${tgt ? `<span style="font-family:var(--mono);font-size:12px;color:var(--blue);white-space:nowrap">${tgt}</span>` : ""}
          </div>
          <div class="pred-detail">
            Model: <span style="color:${modelColor}">${ms.direction === "UP" ? "▲" : "▼"} ${ms.direction}</span>
            &nbsp;${(ms.prob_up * 100).toFixed(1)}%&nbsp;(${ms.horizon || ""})
            &nbsp;·&nbsp;
            Flow: <span style="color:${flowColor}">${flowArrow} ${flow}</span>
          </div>
        </div>`;
    } else if (hasModel) {
      predHtml = `
        <div class="pred-box">
          <div class="pred-detail">
            Model: <span style="color:${modelColor}">${ms.direction === "UP" ? "▲" : "▼"} ${ms.direction}</span>
            &nbsp;${(ms.prob_up * 100).toFixed(1)}%&nbsp;(${ms.horizon || ""})
            &nbsp;·&nbsp;
            Flow: <span style="color:${flowColor}">${flowArrow} ${flow}</span>
          </div>
        </div>`;
    } else {
      predHtml = `
        <div class="pred-box" style="font-family:var(--mono);font-size:11px;color:var(--subtext)">
          No model signal — run predictions first
        </div>`;
    }

    // Expected move
    const emHtml = em.expected_move ? `
      <div class="em-bar">
        <span class="em-label">Expected Move</span>
        <span class="em-value">±$${em.expected_move} (${em.expected_move_pct}%)</span>
        <span class="em-range">$${em.lower_target} – $${em.upper_target}</span>
      </div>` : "";

    // Unusual volume
    let unusualHtml = "";
    if (unusual.length > 0) {
      const rows = unusual.slice(0, 3).map(u => `
        <div class="unusual-row">
          <span class="${u.type === "CALL" ? "u-call" : "u-put"}">${u.type} $${u.strike}</span>
          <span class="u-ratio">${u.vol_oi_ratio}× vol/OI</span>
          <span class="u-vol">${u.volume.toLocaleString()} vol</span>
        </div>`).join("");
      unusualHtml = `
        <div class="unusual-section">
          <div class="unusual-title">Unusual Volume (${unusual.length} flagged)</div>
          ${rows}
        </div>`;
    } else {
      unusualHtml = `<div style="font-family:var(--mono);font-size:11px;color:var(--subtext);margin-top:4px">No unusual volume detected</div>`;
    }

    const gexWalls = [
      gex.call_wall ? `C $${gex.call_wall}` : "",
      gex.put_wall  ? `P $${gex.put_wall}`  : "",
    ].filter(Boolean).join(" · ");

    return `
      <div class="ticker-card">
        <div class="card-header">
          <div>
            <div class="card-ticker">${ticker}</div>
            <div class="card-expiry">Exp: ${data.nearest_expiry || "—"} (${data.dte || "?"}d)</div>
          </div>
          <div style="text-align:right">
            <div class="card-price">$${spot.toFixed(2)}</div>
            <span class="flow-badge flow-${flow}">${flowArrow} ${flow}</span>
          </div>
        </div>

        ${predHtml}

        <div class="metrics-row">
          <div class="metric-box">
            <div class="metric-label">PCR Vol</div>
            <div class="metric-value" style="color:${pcrColor}">${pcrVal.toFixed(3)}</div>
            <div class="metric-sub">${pcr.sentiment || "N/A"}</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">IV Rank</div>
            <div class="metric-value" style="color:${ivrColor}">
              ${ivr.iv_rank != null ? ivr.iv_rank.toFixed(1) + "%" : "N/A"}
            </div>
            <div class="metric-sub">${(ivr.iv_label || "").slice(0, 14)}</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">GEX</div>
            <div class="metric-value" style="color:${gexColor}">${gex.gex_bias || "N/A"}</div>
            <div class="metric-sub">${gexWalls}</div>
          </div>
        </div>

        ${emHtml}
        ${unusualHtml}
      </div>`;
  }

  // ── Init: check for cached data on load ───────────────────────────────────
  (async () => {
    try {
      const r    = await fetch("/api/options-flow");
      const data = await r.json();
      if (data.has_data) {
        const n = Object.keys(data.results).length;
        setStatus(`${n} ticker${n !== 1 ? "s" : ""} scanned`);
        document.getElementById("chart-link").style.display = "inline-block";
        resetBtn("⟳ Rescan");
        renderCards(data.results);
      } else if (data.scanning) {
        resetBtn("Scanning…");
        document.getElementById("scan-btn").disabled = true;
        setStatus("Scan in progress…");
        pollTimer = setInterval(checkStatus, 3000);
      }
    } catch(e) { console.error("Init check failed:", e); }
  })();
</script>

</body>
</html>
